<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGS Wine - Age Verification</title>
    {% load static %}
     <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">  <!-- Added Bootstrap for responsiveness -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body data-home-url="{% url 'home' %}">
    <div class="background-image" style="background-image: url('{% static 'images/wine5.jpg' %}');"></div>
    <nav class="navbar navbar-expand-lg navbar-wine">  <!-- Bootstrap navbar for mobile hamburger menu -->
        <div class="container-fluid">
            <a class="navbar-brand logo" href="{% url 'home' %}">
            <img src="{% static 'images/logs logo.png' %}" alt="LOGS Wine Logo" class="logo-img"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button id="theme-toggle" class="theme-toggle-btn btn btn-outline-secondary">Toggle Theme</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="age-gate-container container mt-5">  <!-- Bootstrap container for centering and padding -->
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">  <!-- Responsive columns: full-width on mobile, narrower on desktop -->
                <div class="wine-glass-icon mb-3">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3C13.6569 3 15 4.34315 15 6C15 7.65685 13.6569 9 12 9C10.3431 9 9 7.65685 9 6C9 4.34315 10.3431 3 12 3ZM12 11C14.7614 11 17 13.2386 17 16V21H7V16C7 13.2386 9.23858 11 12 11Z" fill="var(--accent-color)" class="wine-glass-fill"/>
                    </svg>
                </div>
                <h1>Welcome to LOGS Wine</h1>
                <p class="typewriter">Let us see some ID please.</p>
                <form id="age-gate-form" class="mt-4">
                    <div class="form-check mb-3">
                        <input type="checkbox" id="age-confirm" name="age-confirm" class="form-check-input">
                        <label for="age-confirm" class="form-check-label">I confirm that I am 18 years or older.</label>
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox" id="remember-me" name="remember-me" class="form-check-input">
                        <label for="remember-me" class="form-check-label remember-me-label">Remember Me</label>
                    </div>
                    <button type="submit" id="enter-btn" class="btn btn-primary enter-btn w-100" disabled>Enter</button>  <!-- Full-width button on mobile -->
                </form>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 LOGS Wine. All rights reserved.</p>
            <div class="social-links">
                <p>Follow us on:</p>
                <ul>
                    <li><a href="https://x.com/LOGSWine" target="_blank" aria-label="Follow us on X"><i class="fab fa-x-twitter"></i></a></li>
                    <li><a href="https://facebook.com/LOGSWine" target="_blank" aria-label="Follow us on Facebook"><i class="fab fa-facebook-f"></i></a></li>
                    <li><a href="https://youtube.com/@LOGSWine" target="_blank" aria-label="Follow us on YouTube"><i class="fab fa-youtube"></i></a></li>
                    <li><a href="https://instagram.com/LOGSWine" target="_blank" aria-label="Follow us on Instagram"><i class="fab fa-instagram"></i></a></li>
                </ul>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>  <!-- Bootstrap JS for navbar toggle -->
    <script src="{% static 'js/age_gate.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
